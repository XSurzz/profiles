<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profiles</title>

<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&family=Schoolbell&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0d0d0d;
  --surface:#141414;
  --border:#222;
  --text:#f0ede8;
  --muted:#666;
  --letterboxd:#00FFFF;

  --font-display:'Schoolbell',sans-serif;
  --font-body:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  padding:60px 20px;
}

header{
  text-align:center;
  margin-bottom:60px;
}

.eyebrow{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:16px;
}

h1{
  font-family:var(--font-display);
  font-size:clamp(2.2rem,6vw,3.8rem);
  font-weight:800;
}

.grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:.25s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 24px 48px rgba(0,0,0,.5);
}

.card-banner{
  height:140px;
  position:relative;
  overflow:hidden;
}

.card-banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.1),
    rgba(0,0,0,.55)
  );
}

.pltform-badge{
  position:absolute;
  top:10px;
  left:10px;
  z-index:2;

  display:flex;
  align-items:center;
  gap:6px;

  padding:5px 10px;

  border-radius:999px;

  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.08);
}

.platform-badge span{
  font-size:11px;
  letter-spacing:.05em;
}

.card-body{
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.user-name{
  font-family:var(--font-display)
  font-size:1.2rem;
  font-weight:600;
}

.user-handle{
  font-size:12px;
  color:var(--muted);
}

.recents-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--muted);
  margin-bottom:8px;
}

.favs-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.fav-item{
  aspect-ratio:2/3;
  overflow:hidden;
  border-radius:6px;
  background:#1a1a1a;
}

.fav-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.cta{
  margin-top:auto;

  display:flex;
  justify-content:center;
  align-items:center;

  text-decoration:none;

  background:var(--letterboxd);
  color:#000;

  padding:10px 18px;
  border-radius:8px;

  font-size:12px;
  font-weight:600;
}

@media(max-width:680px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
